author: vinwerill  
date: 2026-04-01  
question: |
  在設計資料庫的 page layout 時，工程師需要根據資料特性選擇合適的儲存結構。Slotted Page 是一種常見的頁面內資料管理方式。請問在以下情境中，最能發揮 Slotted Page 的設計優勢？  
options:  
  - text: "**商品描述 或 使用者備註**，通常是可變長文字欄位。"  
    correct: true  
    explanation: |
      Slotted Page 透過 slot table 管理每個記錄的起始位置與長度，非常適合這類變長欄位資料。它能有效利用頁面空間，避免 fixed-length layout 為每筆 record 預留最大空間造成的空間浪費，並方便在頁面內進行插入、刪除 或 更新操作。  

  - text: "**訂單編號 或 會員 ID**，固定長度整數欄位。"  
    explanation: |
      這類固定長度欄位資料可直接用更簡單的連續陣列儲存， Slotted Page 的間接地址造成的額外 overhead 反而會造成效能浪費。  

  - text: "**學生學號 與 身分證字號**，長度固定的字串欄位。"  
    explanation: |
      這類資料雖然是字串，但長度固定，因此可以用固定長度方式儲存，不會有明顯空間浪費，Slotted Page 的優勢有限。

  - text: "**訂單建立日期 或 出貨日期**，固定長度的日期欄位格式。"  
    explanation: |
      這類日期資料通常為固定長度欄位，例如 timestamp 或 date type，可直接以規則排列方式儲存，不需要 Slotted Page 的 slot table 來管理變動長度資料。