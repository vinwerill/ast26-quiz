author: vinwerill
date: 2026-04-02
question: |
  你正在設計一個資料庫系統，其 workload 特性為「低頻率讀取，但高頻率寫入」。
  為了在此情境下達到最佳效能，你需要選擇合適的索引結構。

  在以下四種組合中，請判斷哪一個最適合此 workload。
options:
  - text: "使用 LSM Tree 搭配 Tiered Compaction"
    correct: true
    explanation: |
      LSM Tree 將寫入轉為 sequential I/O，適合高頻寫入情境。
      Tiered Compaction 則延後合併時機，減少資料重寫次數（write amplification 較低），
      因此在寫入密集、讀取較少的 workload 下，能有效提升整體效能。

  - text: "使用 B+ Tree 搭配 Leveled Compaction"
    explanation: |
      B+ Tree 並不使用 compaction 機制，Leveled Compaction 是 LSM Tree 的策略之一，
      此外，B+ Tree 在高頻寫入下仍需頻繁進行 random I/O 與 node split，
      並不適合寫入密集型 workload。

  - text: "使用 LSM Tree 搭配 Leveled Compaction"
    explanation: |
      雖然 LSM Tree 適合寫入，但 Leveled Compaction 會頻繁進行 merge，
      導致較高的 write amplification，反而不利於高頻寫入情境。
      它較適合讀取頻繁、需要低 read amplification 的 workload。

  - text: "使用 B+ Tree 搭配 Tiered Compaction"
    explanation: |
      B+ Tree 並沒有 compaction 機制，Tiered Compaction 屬於 LSM Tree 的設計。
      此外，B+ Tree 在高頻寫入下仍需頻繁進行 random I/O 與 node split，
      並不適合寫入密集型 workload。