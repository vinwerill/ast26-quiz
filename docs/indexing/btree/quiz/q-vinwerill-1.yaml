author: vinwerill
date: 2026-03-30
question: |
  你正在設計一個以 B+Tree 作為索引結構的資料庫系統。雖然理想上希望樹的高度越低越好，
  但實務上每個 node 的大小通常不會超過一個 page（例如 4 KB 或 8 KB）。

  在以下四種解釋中，請判斷哪一個最合理說明為何 B+Tree 的 node 大小通常會限制在單一 page 內。
options:
  - text: "若一個 node 剛好對齊並完整放入單一 page，則每次存取 node 只需一次 page I/O，避免跨 page 存取帶來額外的 I/O 成本與複雜性。"
    correct: true
    explanation: |
      將 node 限制在單一 page 內，可以確保一次 I/O 就能完整讀取該 node 。
      若 node 跨越多個 page，則每次存取可能需要多次 I/O，反而增加延遲，
      抵銷降低樹高所帶來的效益，因此實務上會將 node size 控制在一個 page 內。

  - text: "將 node 限制在單一 page 可確保 B+Tree 的分支因子固定，避免樹高隨資料量增加而不穩定。"
    explanation: |
      分支因子雖然會隨 node size 改變，但限制 node 在 page 內並不是為了“固定樹高”，
      樹高會自然隨資料量增加而增加，此說法誤將 I/O 考量與樹高控制混淆。

  - text: "若 node 太大，排序或搜尋會變慢，因此一定要限制在單一 page 內才能保持搜尋效率。"
    explanation: |
      node 內排序或搜尋效率主要受 CPU cache 影響，實務上 node size 限制在 page 是為了 I/O 效率，而不是 CPU 搜尋速度。
      此說法過度將設計理由歸因於計算成本，而非儲存成本。

  - text: "若 node 太大，分裂或合併操作會變得複雜，因此必須限制在單一 page。"
    explanation: |
      雖然分裂或合併操作與 node 大小有關，但實務上限制 node 在 page 內的主要原因是 I/O 效率，而不是為了簡化節點操作。
      Node 大小限制與樹的高度和一次 I/O 讀取完整 node 的需求更直接相關。