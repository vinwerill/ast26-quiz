author: kai-lee0704
date: 2026-04-01
question: |
  測試一顆 SSD 時，在大量修改並寫入新資料的過程中突然斷電，經過重啟後發現：

  *部分資料未成功獲得修正，仍是舊資料
  *NAND 內已有寫入的新資料並且並未全部遺失

  若在不考慮 cache 問題的情況下，以下哪個是最有可能的原因
options:
  - text: "因為斷電，NAND flash 自動回復舊資料"
    explanation: |
      NAND 本身並無 rollback 的機制
  - text: "SSD 採用 out-of-place write 策略，但 FTL 尚未完成 mapping 的更新"
    correct: true
    explanation: |
      out-of-place write 把新資料寫到新的 physical page，重啟後 mapping 仍指向舊的 physical page，所以讀到舊資料；新資料雖然存在 NAND 中，但沒有 mapping 指向它，等同不可見
  - text: "block 因為斷電導致被 erase"
    explanation: |
      block 的 erase 不會因為斷電而突然發生，而是需要對整個 block 施加高電壓
  - text: "斷電導致 NAND 中的新資料覆寫了舊資料的一部份，造成新舊資料混雜而無法讀取正確內容"
    explanation: |
      根據 out-of-place write 機制，每次寫入都會選擇空白的 new page 寫入，而非直接 erase block 來進行資料的改動
