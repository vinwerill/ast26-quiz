author: david20041024
date: 2026-03-18
question: |
  在購買 SSD 時，會發現 QLC NAND Flash 相較於 SLC NAND Flash 而言更加便宜，其中使 QLC NAND Flash 比較便宜的原因為?
options:
  - text: "在相同的物理矽晶片面積下，QLC 能提供 4 倍的資料容量，降低單位容量的製造成本"
    correct: true
    explanation: |
      QLC 每個 Cell 可以儲存 4 個 bit，而 SLC 每個 Cell 可以儲存 1 個 bit，在同容量下，QLC 的 Cell 數量是 SLC 的 1/4，因此降低單位容量的製造成本。
  - text: "QLC 在製成上，浮閘物理上被切分成很多隔間，所以隔間內的製造難度降低了"
    explanation: |
      浮閘並沒有進行物理上的切分處理，而使用閾值來判斷儲存的資料，因此製造難度並沒有降低。
  - text: "同物理空間大小下，QLC 能擺進更多的 Cell，從而使 QLC NAND Flash 比較便宜"
    explanation: |
      空間使用率與 SLC 跟 QLC 沒什麼關係，與 2D 到 3D 的 Flash 技術進步更有關係。
  - text: "QLC 與 NVMe 契合度非常高，不用太花費心力去處理資料的轉換"
    explanation: |
      NVMe 是一個很契合 SSD 的通訊協議，讓 SSD 的效能可以被更好地發揮，但跟 QLC 與 SLC 價格上的差別沒什麼關係。