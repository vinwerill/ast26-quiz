author: minhsun-c
date: 2026-03-14
question: |
  一位工程師正在改良一台資料庫的伺服器。為了延長 SSD 的使用壽命，他考慮調整檔案系統配置與資料庫的合併策略。目前系統參數如下：
  1. 應用層 (LSM-Tree) WAF：12
  2. 檔案系統層 (Journaling) WAF：2
  3. SSD 內部 (GC) WAF：2
  
  工程師提出了以下改良方案：
  - 改良資料庫合併策略，將應用層 WAF 從 12 降至 5。
  - 將檔案系統改為 `data=ordered` 模式，將其 WAF 從 2 降至 1.2。
  - SSD 內部的 GC WAF 保持為 2（假設工作負載仍為隨機寫入）。
  
  下列哪一項最能準確描述此改良後的結果？

options:
  - text: "系統總體 WAF 減少了 $7.8$ ($(12+2+2) - (5+1.2+2)$)，這將導致 SSD 壽命呈線性提升。"
    explanation: |
      由於每一層的輸出會成為下一層的輸入，所以 WAF 的放大效果是相乘的。
  - text: "系統總體 WAF 從 $48$ 降至 $12$ ，這意味著在寫入相同邏輯資料量時，NAND 承受的物理損耗減少了 75%。"
    correct: true
    explanation: |
      初始 WAF 為 $12 \times 2 \times 2 = 48$；改良後的 WAF 為 $5 \times 1.2 \times 2 = 12$。
      總體 WAF 降至原本的 25%，實體磨損減少了 75%，有效將硬碟壽命延長為原本的四倍。
  - text: "總體 WAF 僅由最高層 (LSM-Tree) 決定；因此，檔案系統層的變動對於 SSD 實際受到的總寫入量 (TBW) 沒有影響。"
    explanation: |
      每一層對於 WAF 都至關重要。以本題為例，檔案系統層的 WAF 從 $2$ 降至 $1.2$ ，在其他條件不變的情況下，總體 WAF 即
      從 $48$ ($12 \times 2 \times 2$) 降至 $28.8$ ($12 \times 1.2 \times 2$)，每寫入 1 MB 邏輯資料便少損耗
      19.2 MB 的 NAND，影響不可忽視。
  - text: "系統總體 WAF 從 $48$ 降至 $12$ ，因此此 SSD 的 TBW 規格將提升為原本的四倍。"
    explanation: |
      TBW 是由 NAND 的實體特性所決定的固定值。WAF 數值降低，使得相同的 NAND 能承載更多的邏輯寫入量，而非 TBW 規格本身提升。