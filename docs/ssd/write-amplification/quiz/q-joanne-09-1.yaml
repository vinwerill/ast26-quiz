author: joanne-09
date: 2026-03-15
question: |
  若為了延長 SSD 壽命將系統從 **B+ Tree** 結構改為 **Append-only** （如 LSM-Tree） ，並採用 Tiered Compaction 策略來最小化資料合併的頻率。
  雖然優化後 WAF 大幅下降，但測試發現讀取效能明顯變差了。為什麼降低 WAF 的操作會導致讀取效能降低？
options:
  - text: "因為追加寫入會導致 SSD 內部的 Block 產生更多碎片，使搜尋資料時必須頻繁移動讀取頭。"
    explanation: |
      SSD 沒有讀取頭，雖然 SSD 的隨機讀取跟順序讀取效能有差，但不是因為物理移動。
  - text: "因為為了降低寫入時的合併次數（低 WAF），系統允許資料的不同版本存在於更多個不相干的檔案中，導致讀取時必須掃描更多位置。"
    correct: true
    explanation: |
      用 B+ Tree 的結構在隨機寫入時會造成物理 block 碎片化，造成高 WAF 但讀取時可以直接透過 virtual address 定位。
      但改為 Append-only 的結構，資料的不同版本可能分散在多個檔案中，讀取時需要掃描更多的檔案來找到最新版本，這會增加讀取延遲。
  - text: "因為低 WAF 策略減少資料遷移，導致 NAND Flash 儲存單元的電壓偏移增加，使得讀取時必須多次重試。"
    explanation: |
      降低 WAF 時資料會在原位放比較久，理論上會增加 read disturb 或電荷流失的風險。但在正常運行的資料庫中，這種硬體級的延遲（微秒級）與 LSM-Tree 架構層級的讀取延遲相比影響極低。
  - text: "因為 LSM-Tree 的追加寫入會導致檔案系統產生的 Metadata 過多，進而阻塞了原本屬於資料讀取的頻寬。"
    explanation: |
      雖然 Metadata 確實會增加，但 OS 通常會把 Metadata 存在快取中，在讀取檔案時，查詢 RAM 的開銷通常只有幾微秒，對於總體的讀取延遲影響極低，且硬體 IO 次數才是主要瓶頸。
      