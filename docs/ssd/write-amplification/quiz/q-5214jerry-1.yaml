author: 5214jerry
date: 2026-03-16
question: |
  在缺乏大量超額配置 (Over-provisioning) 空間的消費級 SSD 中，
  哪一種 I/O 工作負載模式會導致最嚴重的寫入放大 (write amplification) 現象？

options:
  - text: "針對大檔案進行持續且密集的循序寫入。"
    
    explanation: |
      當這個大檔案未來被使用者修改或刪除時，通常是整批資料一起過期。
      因此，這個物理區塊內的所有 Pages 會同時變成無效 (Invalid) 狀態。
  - text: "長時間進行大量的純讀取操作，偶爾穿插小檔案的寫入。"
    explanation: |
      讀取不會消耗可用的空白區塊。寫入頻率極低，SSD 有非常充裕的時間與空白空間來處理這些零星的小檔案寫入。
  - text: "針對全碟可用空間進行高頻率、小區塊的隨機寫入。"
    correct: true
    explanation: |
      當系統不斷在全碟各處寫入極小區塊 (例如 4KB) 的資料時，
      這些新資料會被寫入新的空白頁面，而舊的資料頁面會被標記為無效。
      久而久之，每一個物理區塊內都變成大部分仍為有效資料，但夾雜少部分無效資料。
  - text: "定期寫入大型的日誌檔案，寫滿後直接將整個檔案刪除。"
    explanation: |
      這本質上是選項 (A) 的變體。
      寫入日誌檔案通常是一種「循序附加 (Sequential Append)」的操作，它會非常有效率且連續地填滿物理區塊。
