author: vinwerill
date: 2026-04-04
question: |
  Flexible Data Placement（FDP）可以透過資料分群、寫入重組與其他策略，
  除了降低 Write Amplification Factor（WAF），還能帶來一些其他好處。

  以下哪一項優化與降低 WAF 最無關？
options:
  - text: "將具有相似更新頻率（hot data、cold data）集中放置"
    explanation: |
      將 hot data 集中可以避免更新時連帶搬移 cold data，顯著降低 GC 搬移量，是 FDP 降低 WAF 的核心方法之一。

  - text: "將寫入對齊 SSD erase block 或 zone 單位"
    explanation: |
      對齊 erase block 或 zone 可提升 block 回收效率，減少 GC 搬移成本，進而降低 WAF。

  - text: "將 random write 經過 buffer 重組為 sequential write 再寫入 SSD"
    explanation: |
      將 random write 轉為 sequential write 可減少 fragmentation，提升 block utilization，降低 GC 搬移需求，是 FDP 實作的重要手段。

  - text: "支援將資料既能順序寫入也能隨機寫入，以提升寫入彈性與可整合性"
    correct: true
    explanation: |
      FDP 允許資料同時支援順序寫入與隨機寫入，提升管理彈性與 host/SSD 協作整合性，但這個特性本身不會自動降低 NAND 寫入量或 GC 搬移，因此與降低 WAF 無直接關係。