author: lunnn17
date: 2026-03-27
question: |
  一個長期存放冷資料 (Cold Storage) 的資料中心計畫將現有的硬碟汰換為成本較低的 QLC SSD。
  考慮到 QLC 的物理特性以及該資料中心「讀多寫極少」的工作負載模式，哪一種機制適合用來防止資料遺失？
options:
  - text: "增加 Over-provisioning (OP) 空間比例"
    explanation: |
      增加 OP 空間主要目的是為了降低 write amplification (WAF) 並提升 Endurance。
      但題目設定的工作負載是「寫入極少」，代表 P/E cycles 的消耗並非主要瓶頸，增加 OP 無法解決電荷隨著時間自然洩漏導致的 Retention 問題。
  - text: "降低裝置的每日寫入量 (DWPD) 額定值"
    explanation: |
      DWPD 是衡量 Endurance 的指標。雖然 QLC 的 Endurance 較低，但在「讀多寫極少」的環境中，本來就不會達到寫入上限。
      降低 DWPD 對於防止已存放在 NAND 晶片中資料因時間和溫度產生的 Retention 失效沒有物理上的幫助。
  - text: "提高損耗均衡 (Wear Leveling) 演算法的執行頻率"
    explanation: |
      Wear Leveling 的目的是確保所有 Flash Block 磨損程度一致，主要解決的是 Endurance 問題。
      但在「讀多寫極少」的工作負載下，根本沒有足夠的寫入動作去觸發「損耗」，因此提高其頻率對保護「已經寫入且長期靜止」的冷資料沒有意義。
  - text: "實施定期資料掃描與重刷 (Periodic Data Scrubbing/Refresh)"
    correct: true
    explanation: |
      在「讀多寫少」的冷儲存情境下，雖然對 Endurance 的磨損極低，但資料長時間存放會面臨 Retention 問題。
      由於 QLC 的電壓邊限 (Voltage Margins) 非常窄，電荷洩漏 (Charge Leakage) 極易導致位元翻轉。
      定期讀取並重新寫入資料 (Refresh) 能校正漂移的電壓，會是適合的方法。
